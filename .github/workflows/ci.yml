name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '**.yml'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '**.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    if: "contains(github.event.head_commit.message, 'check: ')"
    
    strategy:
      matrix:
        node-version: [18, 20, 22]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Install dependencies
        run: |
          cd packages/sprint-es && npm install
          cd ../create-sprint && npm install
          
      - name: Build sprint-es
        run: |
          cd packages/sprint-es
          npm run build
          
      - name: Build create-sprint
        run: |
          cd packages/create-sprint
          npm run build
          
      - name: Run tests
        run: |
          cd packages/sprint-es
          npm test --passWithNoTests
