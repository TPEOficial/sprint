name: Lint & Type Check

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '**.yml'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '**.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    if: "contains(github.event.head_commit.message, 'check: ')"
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install dependencies
        run: |
          cd packages/sprint-es && npm install
          cd ../create-sprint && npm install
       
      - name: TypeScript Check sprint-es
        run: |
          cd packages/sprint-es
          npx tsc --noEmit || true
          
      - name: TypeScript Check create-sprint
        run: |
          cd packages/create-sprint
          npx tsc --noEmit || true

  formatting:
    runs-on: ubuntu-latest
    if: "contains(github.event.head_commit.message, 'check: ')"
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install dependencies
        run: |
          cd packages/sprint-es && npm install
          cd ../create-sprint && npm install
      
      - name: Check Prettier formatting
        run: |
          npx prettier --check "packages/**/*.{ts,js,json,md,yml}" || true
