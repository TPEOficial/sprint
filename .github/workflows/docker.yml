name: Docker Build

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'

jobs:
  docker:
    runs-on: ubuntu-latest
    if: "contains(github.event.head_commit.message, 'check: ')"
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install dependencies
        run: |
          cd packages/sprint-es && npm install
          cd ../create-sprint && npm install
      
      - name: Build sprint-es
        run: |
          cd packages/sprint-es
          npm run build
      
      - name: Build create-sprint
        run: |
          cd packages/create-sprint
          npm run build
      
      - name: Create test project with Docker
        run: |
          cd /tmp
          rm -rf docker-test
          node ${{ github.workspace }}/packages/create-sprint/dist/cli.js --name docker-test --ts --swagger --docker --yes
          cd docker-test
          npm install
          
      - name: Build & Start with Docker Compose
        working-directory: /tmp/docker-test
        run: |
          cd /tmp/docker-test
          docker compose up -d --build
              
      - name: Wait & Test Health
        working-directory: /tmp/docker-test
        run: |
          echo "Waiting for health..."
              
          for i in {1..30}; do
            if curl -s http://localhost:5000/health; then
              echo "Health OK"
              exit 0
            fi
            sleep 1
          done
              
          echo "Health failed"
          docker compose logs
          exit 1
              
      - name: Stop containers
        working-directory: /tmp/docker-test
        if: always()
        run: |
          cd /tmp/docker-test
          docker compose down
          
      - name: Create test project with GraphQL
        run: |
          cd /tmp
          rm -rf docker-test-graphql
          node ${{ github.workspace }}/packages/create-sprint/dist/cli.js --name docker-test-graphql --ts --graphql --docker --yes
          cd docker-test-graphql
          npm install
          
      - name: Build & Start GraphQL with Docker Compose
        working-directory: /tmp/docker-test-graphql
        run: docker compose up -d --build
              
      - name: Wait & Test GraphQL Health
        working-directory: /tmp/docker-test-graphql
        run: |
          echo "Waiting for GraphQL container..."
              
          for i in {1..30}; do
            if curl -s http://localhost:5001/health; then
              echo "Health OK"
              exit 0
            fi
            sleep 1
          done
              
          echo "Health failed"
          docker compose logs
          exit 1
              
      - name: Stop GraphQL containers
        if: always()
        working-directory: /tmp/docker-test-graphql
        run: docker compose down