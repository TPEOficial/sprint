name: Docker Build

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - '**.yml'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '**.yml'

jobs:
  docker:
    runs-on: ubuntu-latest
    if: "contains(github.event.head_commit.message, 'check: ')"
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install dependencies
        run: |
          cd packages/sprint-es && npm install
          cd ../create-sprint && npm install
      
      - name: Build sprint-es
        run: |
          cd packages/sprint-es
          npm run build
      
      - name: Build create-sprint
        run: |
          cd packages/create-sprint
          npm run build
      
      - name: Create test project with Docker
        run: |
          cd /tmp
          rm -rf docker-test
          node ${{ github.workspace }}/packages/create-sprint/dist/cli.js --name docker-test --ts --swagger --docker --yes
          cd docker-test
          npm install
          
      - name: Build & Start with Docker Compose
        run: |
          cd /tmp/docker-test
          docker compose up -d --build
              
      - name: Wait & Test Health
        run: |
          echo "Waiting for container..."
          sleep 10
              
          echo "---- SERVICES ----"
          docker compose ps
              
          echo "---- LOGS ----"
          docker compose logs || true
              
          echo "---- CURL TEST ----"
          curl -v http://localhost:5000/health
              
      - name: Stop containers
        if: always()
        run: |
          cd /tmp/docker-test
          docker compose down
          
      - name: Create test project with GraphQL
        run: |
          cd /tmp
          rm -rf docker-test-graphql
          node ${{ github.workspace }}/packages/create-sprint/dist/cli.js --name docker-test-graphql --ts --graphql --docker --yes
          cd docker-test-graphql
          npm install
          
      - name: Build Docker image with GraphQL
        run: |
          cd /tmp/docker-test-graphql
          docker build -t sprint-test-graphql .
          
      - name: Run Docker container with GraphQL
        run: |
          docker run -d -p 5001:5000 --name sprint-test-graphql sprint-test-graphql
          sleep 10
          curl -s http://localhost:5001/health || exit 1
          docker stop sprint-test-graphql || true
          docker rm sprint-test-graphql || true
